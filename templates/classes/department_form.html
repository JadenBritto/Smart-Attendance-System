{% extends 'base.html' %}
{% block title %}{{ title }} - SmartAttend{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-xl border border-slate-200 p-6">
        <form method="post">
            {% csrf_token %}
            <div class="space-y-5">
                {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<p class="mt-1.5 text-sm text-red-600">{{ field.errors.0 }}</p>{% endif %}
                </div>
                {% endfor %}
            </div>
            <div class="mt-6 flex items-center gap-3 pt-5 border-t border-slate-100">
                <button type="submit" class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg hover:bg-indigo-500 transition text-sm font-medium">Save Department</button>
                <a href="{% url 'classes:department_list' %}" class="px-5 py-2.5 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
